services:

  frontend:
    image: mbvgua/mimifua-frontend
    restart: unless-stopped
    container_name: mimifua_frontend

  watchtower:
    image: nickfedor/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
